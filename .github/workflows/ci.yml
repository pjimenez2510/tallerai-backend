name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dev:dev@localhost:5432/tallerai

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://dev:dev@localhost:5432/tallerai
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
